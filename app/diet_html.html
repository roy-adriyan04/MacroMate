<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Be+Vietnam+Pro:wght@300;400;500;600&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary-fixed-dim": "#4493ff",
                        "on-primary-container": "#00224a",
                        "surface-container-highest": "#d7dee3",
                        "tertiary-container": "#8efecb",
                        "surface-tint": "#005ab2",
                        "on-error-container": "#570008",
                        "surface-container": "#e3e9ee",
                        "secondary-dim": "#813c00",
                        "on-surface": "#2a2f32",
                        "tertiary-fixed-dim": "#80efbd",
                        "outline": "#73777b",
                        "surface-variant": "#d7dee3",
                        "on-secondary-container": "#753500",
                        "error-container": "#fb5151",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary-fixed": "#004d34",
                        "on-surface-variant": "#575c60",
                        "on-secondary": "#fff0e8",
                        "on-secondary-fixed": "#572600",
                        "primary-dim": "#004e9c",
                        "inverse-on-surface": "#999da1",
                        "on-primary-fixed-variant": "#002b5b",
                        "surface": "#f3f7fb",
                        "inverse-primary": "#3c90ff",
                        "background": "#f3f7fb",
                        "on-tertiary": "#c8ffe1",
                        "surface-dim": "#ced5db",
                        "surface-container-high": "#dde3e8",
                        "secondary": "#914709",
                        "on-secondary-fixed-variant": "#833d00",
                        "secondary-fixed-dim": "#ffb283",
                        "surface-bright": "#f3f7fb",
                        "primary": "#005ab2",
                        "secondary-container": "#ffc5a3",
                        "primary-container": "#64a1ff",
                        "on-background": "#2a2f32",
                        "outline-variant": "#a9aeb1",
                        "on-primary-fixed": "#000000",
                        "inverse-surface": "#0a0f12",
                        "tertiary-fixed": "#8efecb",
                        "error": "#b31b25",
                        "tertiary": "#006949",
                        "on-primary": "#eff2ff",
                        "on-tertiary-fixed-variant": "#006d4c",
                        "on-tertiary-container": "#006243",
                        "primary-fixed": "#64a1ff",
                        "error-dim": "#9f0519",
                        "secondary-fixed": "#ffc5a3",
                        "on-error": "#ffefee",
                        "surface-container-low": "#ecf1f6",
                        "tertiary-dim": "#005b3f"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Be Vietnam Pro"],
                        "label": ["Plus Jakarta Sans"]
                    }
                },
            },
        }
    </script>
<style>
        .clay-card {
            box-shadow: 0 20px 40px rgba(42,47,50,0.06), 
                        inset 4px 4px 0px rgba(255,255,255,0.8), 
                        inset -4px -4px 8px rgba(206,213,219,0.5);
        }
        .clay-pressed {
            box-shadow: inset 6px 6px 12px rgba(0, 0, 0, 0.08), 
                        inset -4px -4px 8px rgba(255, 255, 255, 0.9);
            transform: scale(0.98);
        }
        .clay-button {
            box-shadow: 0 10px 20px rgba(0, 90, 178, 0.2), 
                        inset 2px 2px 4px rgba(255,255,255,0.4);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .active-glow {
            box-shadow: 0 0 20px rgba(0, 105, 73, 0.15);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-surface font-body text-on-surface min-h-screen">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 right-0 z-50">
<div class="bg-gradient-to-b from-[#f3f7fb] to-[#ecf1f6] dark:from-slate-900 dark:to-slate-800 shadow-[0_20px_40px_rgba(42,47,50,0.06),inset_0_4px_4px_rgba(255,255,255,0.8)] rounded-b-xl max-w-xl mx-auto">
<div class="flex justify-between items-center w-full px-6 py-4">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:opacity-80 hover:scale-95 transition-all duration-300 active:scale-90 text-[#005ab2]">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-['Plus_Jakarta_Sans'] font-extrabold tracking-tight text-xl text-[#005ab2]">MacroMate</h1>
<button class="text-[#005ab2] font-bold hover:opacity-80 hover:scale-95 transition-all duration-300 active:scale-90">Skip</button>
</div>
</div>
</header>
<main class="pt-24 pb-32 px-6 max-w-xl mx-auto flex flex-col min-h-screen">
<!-- Progress Section -->
<div class="mb-10">
<div class="flex justify-between items-end mb-4">
<span class="text-on-surface-variant font-bold text-sm tracking-widest uppercase">Step 3 of 5</span>
<span class="text-primary font-black text-2xl">60%</span>
</div>
<div class="h-4 w-full bg-surface-container-high rounded-full overflow-hidden p-1 shadow-inner">
<div class="h-full bg-gradient-to-r from-primary to-primary-container rounded-full shadow-[0_0_12px_rgba(0,90,178,0.3)] transition-all duration-1000" style="width: 60%"></div>
</div>
</div>
<!-- Headline -->
<div class="mb-12">
<h2 class="font-headline font-extrabold text-4xl text-on-surface leading-tight tracking-tight mb-4">
                Any dietary preferences?
            </h2>
<p class="text-on-surface-variant text-lg">We'll tailor your meal plans and recommendations to fit your lifestyle.</p>
</div>
<!-- Selection Grid (Bento Style) -->
<div class="grid grid-cols-2 gap-4 flex-grow">
<!-- Vegan Card -->
<button class="clay-card bg-surface-container-lowest p-6 rounded-xl flex flex-col items-start text-left group hover:scale-[1.02] transition-all duration-300 active:scale-95">
<div class="w-12 h-12 rounded-full bg-tertiary-container flex items-center justify-center mb-4 shadow-sm">
<span class="material-symbols-outlined text-on-tertiary-container text-2xl">eco</span>
</div>
<span class="font-headline font-bold text-xl text-on-surface">Vegan</span>
<span class="text-on-surface-variant text-sm mt-1">Plant-based lifestyle</span>
</button>
<!-- Keto Card (Active State Example) -->
<button class="clay-pressed bg-primary-container p-6 rounded-xl flex flex-col items-start text-left relative overflow-hidden active-glow">
<div class="absolute top-0 right-0 p-2">
<span class="material-symbols-outlined text-on-primary-container" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<div class="w-12 h-12 rounded-full bg-surface-container-lowest flex items-center justify-center mb-4 shadow-inner">
<span class="material-symbols-outlined text-primary text-2xl">bolt</span>
</div>
<span class="font-headline font-bold text-xl text-on-primary-container">Keto</span>
<span class="text-on-primary-container/70 text-sm mt-1">High fat, low carb</span>
</button>
<!-- Paleo Card -->
<button class="clay-card bg-surface-container-lowest p-6 rounded-xl flex flex-col items-start text-left hover:scale-[1.02] transition-all duration-300 active:scale-95">
<div class="w-12 h-12 rounded-full bg-secondary-container flex items-center justify-center mb-4 shadow-sm">
<span class="material-symbols-outlined text-on-secondary-container text-2xl">fitness_center</span>
</div>
<span class="font-headline font-bold text-xl text-on-surface">Paleo</span>
<span class="text-on-surface-variant text-sm mt-1">Hunter-gatherer diet</span>
</button>
<!-- Gluten-Free Card -->
<button class="clay-card bg-surface-container-lowest p-6 rounded-xl flex flex-col items-start text-left hover:scale-[1.02] transition-all duration-300 active:scale-95">
<div class="w-12 h-12 rounded-full bg-surface-container flex items-center justify-center mb-4 shadow-sm">
<span class="material-symbols-outlined text-on-surface-variant text-2xl">grain</span>
</div>
<span class="font-headline font-bold text-xl text-on-surface">Gluten-Free</span>
<span class="text-on-surface-variant text-sm mt-1">Celiac safe options</span>
</button>
<!-- Vegetarian Card -->
<button class="clay-card bg-surface-container-lowest p-6 rounded-xl flex flex-col items-start text-left hover:scale-[1.02] transition-all duration-300 active:scale-95">
<div class="w-12 h-12 rounded-full bg-tertiary-container/50 flex items-center justify-center mb-4 shadow-sm">
<span class="material-symbols-outlined text-tertiary text-2xl">egg_alt</span>
</div>
<span class="font-headline font-bold text-xl text-on-surface">Vegetarian</span>
<span class="text-on-surface-variant text-sm mt-1">Meat-free living</span>
</button>
<!-- None Card -->
<button class="clay-card bg-surface-container-lowest p-6 rounded-xl flex flex-col items-start text-left hover:scale-[1.02] transition-all duration-300 active:scale-95">
<div class="w-12 h-12 rounded-full bg-surface-container-high flex items-center justify-center mb-4 shadow-sm">
<span class="material-symbols-outlined text-on-surface text-2xl">restaurant</span>
</div>
<span class="font-headline font-bold text-xl text-on-surface">None</span>
<span class="text-on-surface-variant text-sm mt-1">I eat everything</span>
</button>
</div>
<!-- Decorative Floating Element -->
</main>
<!-- Bottom Action Bar -->
<footer class="fixed bottom-0 left-0 right-0 p-6 z-50">
<div class="max-w-xl mx-auto flex gap-4">
<button class="flex-1 py-5 px-6 rounded-full font-headline font-bold text-primary bg-surface-container-lowest clay-card hover:scale-[0.98] transition-all duration-200 active:scale-90">
                Back
            </button>
<button class="flex-[2] py-5 px-6 rounded-full font-headline font-extrabold text-on-primary bg-gradient-to-br from-primary to-primary-container clay-button hover:scale-[1.02] transition-all duration-200 active:scale-95 flex items-center justify-center gap-2">
                Next Step
                <span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
</footer>
</body></html>
