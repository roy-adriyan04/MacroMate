<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Be+Vietnam+Pro:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary-fixed-dim": "#4493ff",
                        "on-primary-container": "#00224a",
                        "surface-container-highest": "#d7dee3",
                        "tertiary-container": "#8efecb",
                        "surface-tint": "#005ab2",
                        "on-error-container": "#570008",
                        "surface-container": "#e3e9ee",
                        "secondary-dim": "#813c00",
                        "on-surface": "#2a2f32",
                        "tertiary-fixed-dim": "#80efbd",
                        "outline": "#73777b",
                        "surface-variant": "#d7dee3",
                        "on-secondary-container": "#753500",
                        "error-container": "#fb5151",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary-fixed": "#004d34",
                        "on-surface-variant": "#575c60",
                        "on-secondary": "#fff0e8",
                        "on-secondary-fixed": "#572600",
                        "primary-dim": "#004e9c",
                        "inverse-on-surface": "#999da1",
                        "on-primary-fixed-variant": "#002b5b",
                        "surface": "#f3f7fb",
                        "inverse-primary": "#3c90ff",
                        "background": "#f3f7fb",
                        "on-tertiary": "#c8ffe1",
                        "surface-dim": "#ced5db",
                        "surface-container-high": "#dde3e8",
                        "secondary": "#914709",
                        "on-secondary-fixed-variant": "#833d00",
                        "secondary-fixed-dim": "#ffb283",
                        "surface-bright": "#f3f7fb",
                        "primary": "#005ab2",
                        "secondary-container": "#ffc5a3",
                        "primary-container": "#64a1ff",
                        "on-background": "#2a2f32",
                        "outline-variant": "#a9aeb1",
                        "on-primary-fixed": "#000000",
                        "inverse-surface": "#0a0f12",
                        "tertiary-fixed": "#8efecb",
                        "error": "#b31b25",
                        "tertiary": "#006949",
                        "on-primary": "#eff2ff",
                        "on-tertiary-fixed-variant": "#006d4c",
                        "on-tertiary-container": "#006243",
                        "primary-fixed": "#64a1ff",
                        "error-dim": "#9f0519",
                        "secondary-fixed": "#ffc5a3",
                        "on-error": "#ffefee",
                        "surface-container-low": "#ecf1f6",
                        "tertiary-dim": "#005b3f"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Be Vietnam Pro"],
                        "label": ["Plus Jakarta Sans"]
                    }
                },
            },
        }
    </script>
<style>
        .clay-card {
            box-shadow: 0 20px 40px rgba(42, 47, 50, 0.06), 
                        inset 4px 4px 0px rgba(255, 255, 255, 0.8), 
                        inset -4px -4px 8px rgba(206, 213, 219, 0.5);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .clay-card:active {
            transform: scale(0.95);
            box-shadow: 0 10px 20px rgba(42, 47, 50, 0.04), 
                        inset 2px 2px 0px rgba(255, 255, 255, 0.8), 
                        inset -2px -2px 4px rgba(206, 213, 219, 0.5);
        }
        .clay-card.active {
            background: #005ab2;
            color: white;
            box-shadow: 0 20px 40px rgba(0, 90, 178, 0.2), 
                        inset 4px 4px 0px rgba(255, 255, 255, 0.3), 
                        inset -4px -4px 8px rgba(0, 50, 100, 0.3);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-surface font-body text-on-surface min-h-screen flex flex-col">
<!-- Top Navigation Bar (Shared Component Strategy) -->
<header class="sticky top-0 z-50 w-full">
<div class="bg-gradient-to-b from-[#f3f7fb] to-[#ecf1f6] shadow-[0_20px_40px_rgba(42,47,50,0.06),inset_0_4px_4px_rgba(255,255,255,0.8)] rounded-b-[3rem] px-6 py-4 max-w-xl mx-auto flex justify-between items-center w-full">
<button class="hover:opacity-80 hover:scale-95 transition-all duration-300 active:scale-90 transition-transform duration-200 ease-out text-[#005ab2]">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<span class="font-['Plus_Jakarta_Sans'] font-extrabold tracking-tight text-xl text-[#005ab2]">MacroMate</span>
<button class="hover:opacity-80 hover:scale-95 transition-all duration-300 active:scale-90 transition-transform duration-200 ease-out text-[#a9aeb1] font-bold">
                Skip
            </button>
</div>
</header>
<main class="flex-grow flex flex-col items-center px-6 pt-8 pb-32 max-w-xl mx-auto w-full">
<!-- Progress Section -->
<div class="w-full mb-10">
<div class="flex justify-between items-end mb-3">
<span class="text-on-surface-variant font-label font-bold text-sm tracking-wide">ONBOARDING</span>
<span class="text-primary font-bold">20%</span>
</div>
<div class="h-4 w-full bg-surface-container rounded-full overflow-hidden p-1 shadow-inner">
<div class="h-full bg-gradient-to-r from-primary to-primary-container rounded-full w-[20%] shadow-[0_0_12px_rgba(0,90,178,0.3)]"></div>
</div>
</div>
<!-- Headline -->
<div class="w-full mb-12">
<h1 class="font-headline font-extrabold text-4xl tracking-tight text-on-surface mb-2 leading-tight">
                What is your <br/><span class="text-primary">main goal?</span>
</h1>
<p class="text-on-surface-variant text-lg">We'll tailor your experience based on this choice.</p>
</div>
<!-- Goal Selection Bento Grid -->
<div class="grid grid-cols-2 gap-5 w-full">
<!-- Lose Weight -->
<button class="clay-card active bg-primary text-on-primary h-52 flex flex-col items-start justify-between p-6 rounded-xl text-left">
<div class="bg-white/20 p-3 rounded-lg backdrop-blur-sm">
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">fitness_center</span>
</div>
<span class="font-headline font-bold text-xl leading-tight">Lose<br/>weight</span>
</button>
<!-- Gain Muscle -->
<button class="clay-card bg-surface-container-lowest text-on-surface h-52 flex flex-col items-start justify-between p-6 rounded-lg text-left md:rounded-tr-xl">
<div class="bg-secondary-container/30 p-3 rounded-lg">
<span class="material-symbols-outlined text-3xl text-secondary">exercise</span>
</div>
<span class="font-headline font-bold text-xl leading-tight">Gain<br/>muscle</span>
</button>
<!-- Maintain Weight -->
<button class="clay-card bg-surface-container-lowest text-on-surface h-52 flex flex-col items-start justify-between p-6 rounded-lg text-left md:rounded-bl-xl">
<div class="bg-tertiary-container/30 p-3 rounded-lg">
<span class="material-symbols-outlined text-3xl text-tertiary">balance</span>
</div>
<span class="font-headline font-bold text-xl leading-tight">Maintain<br/>weight</span>
</button>
<!-- Improve Fitness -->
<button class="clay-card bg-surface-container-lowest text-on-surface h-52 flex flex-col items-start justify-between p-6 rounded-xl text-left">
<div class="bg-primary-container/20 p-3 rounded-lg">
<span class="material-symbols-outlined text-3xl text-primary">bolt</span>
</div>
<span class="font-headline font-bold text-xl leading-tight">Improve<br/>fitness</span>
</button>
</div>
<!-- Decoration/Inspiration Card -->
</main>
<!-- Fixed Bottom Action Bar -->
<footer class="fixed bottom-0 left-0 right-0 p-8 bg-gradient-to-t from-surface to-transparent pointer-events-none">
<div class="max-w-xl mx-auto w-full pointer-events-auto">
<button class="w-full bg-gradient-to-r from-primary to-primary-container text-on-primary py-5 rounded-full font-headline font-bold text-lg shadow-[0_20px_40px_rgba(0,90,178,0.2),inset_0_4px_0px_rgba(255,255,255,0.3)] hover:scale-[1.02] active:scale-95 transition-all duration-300 flex items-center justify-center gap-2">
                Continue
                <span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
</footer>
</body></html>
